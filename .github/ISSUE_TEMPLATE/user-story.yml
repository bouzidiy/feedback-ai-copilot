name: User Story
description: Create a user story
title: "[US] "
labels: ["user-story"]

body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this story needed?
      placeholder: |
        Explain the business or functional context.
    validations:
      required: true

  - type: textarea
    id: story
    attributes:
      label: User Story
      description: Describe the user story using the standard format.
      placeholder: |
        As a user

        I want to ...

        So that ...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define when this story is considered done.
      placeholder: |
        Scenario 1:
        Given ...
        When ...
        Then ...

        Scenario 2:
        Given ...
        When ...
        Then ...
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Optional implementation details.
      placeholder: |
        - Spring Boot endpoint
        - PostgreSQL table
        - Integration tests

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
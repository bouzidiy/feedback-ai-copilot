name: User Story
description: Create a user story
title: "US- "
labels: ["user-story"]
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      description: Describe the user story using the standard format.
      placeholder: "As a user, I want to..., so that..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add functional or technical context.
      placeholder: "Explain why this story is needed."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define when this story is considered done.
      placeholder: |
        - [ ] Given..., when..., then...
        - [ ] The user can...
        - [ ] The system displays...
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Add implementation details if needed.
      placeholder: |
        - Angular standalone component
        - Spring Boot REST endpoint
        - PostgreSQL table

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
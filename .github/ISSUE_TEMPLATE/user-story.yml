name: User Story
description: Create a user story
title: "[US] "
labels: ["user-story"]

body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this story needed?
      value: |
        This functionality is part of Feedback AI Copilot.

        The goal of this story is to incrementally build a production-ready application while maintaining clean architecture, testability, and documentation standards.

        This feature contributes to the overall platform capabilities and may be leveraged by future AI, reporting, analytics, or operational features.
    validations:
      required: true

  - type: textarea
    id: story
    attributes:
      label: User Story
      description: Describe the user story using the standard format.
      placeholder: |
        As a user

        I want to ...

        So that ...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Define when this story is considered done.
      placeholder: |
        Scenario 1

        Given ...
        When ...
        Then ...

        Scenario 2

        Given ...
        When ...
        Then ...
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Notes
      description: Optional implementation details.
      placeholder: |
        - Create UseCase
        - Create REST endpoint
        - Add integration tests

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: |
        - Feature implemented
        - Tests passing
        - Documentation updated if needed
        - Issue moved to Done

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true